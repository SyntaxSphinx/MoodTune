<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Language</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Load main CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

<div class="container d-flex justify-content-center">
    <div class="col-md-6 language-box">

        <h3 class="mb-3 fw-bold">CHOOSE YOUR LANGUAGE</h3>
        <h3 id="moodLine" class="mb-4"></h3>

        <!-- Buttons -->
         
        <a id="hindiBtn" class="btn-lang">🇮🇳 Hindi Songs</a>
        <a id="englishBtn" class="btn-lang">🌎 English Songs</a>

        <a href="/" id="back">← Back</a>
        
   </div>
</div>

<script>
    // Extract mood from URL
    const params = new URLSearchParams(window.location.search);
    const mood = params.get("mood") || "happy";

    document.getElementById("moodLine").innerText =
        `You selected the "${mood}" mood.`;

    // Set navigation to playlist page
    document.getElementById("hindiBtn").href =
        `/playlist?mood=${mood}&lang=hindi`;

    document.getElementById("englishBtn").href =
        `/playlist?mood=${mood}&lang=english`;
</script>

</body>
</html>
