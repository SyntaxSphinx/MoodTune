<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Playlist</title>

  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

  <!-- Dynamic mood CSS -->
  <link id="themeCSS" rel="stylesheet" href="{{ url_for('static', filename='css/happy.css') }}">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">



    


</head>

<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">MoodTune</a>
  </div>
</nav>

<div class="container">

  <!-- Hero -->
  <div class="playlist-hero text-center text-white mt-4">
    <h1 id="pageTitle" class="fw-bold">Loading Playlist...</h1>
    <p id="pageSub"></p>
  </div>

  <div class="text-center mt-4">
    <a id="randomBtn">
       🔀 Play Random Song
    </a>
  </div>

  <div id="songsList" class="mt-4"></div>

</div>

<!-- Footer Player -->
<footer id="playerFooter" class="fixed-bottom text-white p-3 d-none" style="z-index: 1050; padding-right: 40px !important;">
  <button id="closePlayerBtn" class="btn-close btn-close-white" style="position: absolute; right: 25px; top: 25px; z-index: 1051;" aria-label="Close"></button>
  <div class="container d-flex justify-content-center">
    <div id="spotifyEmbedContainer" style="width: 100%; max-width: 600px; height: 80px;"></div>
  </div>
</footer>

<script>
const params = new URLSearchParams(window.location.search);
const mood = params.get("mood");
const lang = params.get("lang");

document.getElementById("themeCSS").href = `/static/css/${mood}.css`;

document.getElementById("pageTitle").innerText =
  `${mood.charAt(0).toUpperCase() + mood.slice(1)} • ${lang.toUpperCase()} Playlist`;

document.getElementById("pageSub").innerText = `Showing songs for ${mood} mood.`;

let loadedSongs = [];

// Fetch songs
async function loadSongs() {
  const res = await fetch(`/api/songs?mood=${mood}&language=${lang}`);
  loadedSongs = await res.json();
  renderSongs(loadedSongs);
}

function renderSongs(songs) {
  const div = document.getElementById("songsList");
  div.innerHTML = "";

  if (songs.length === 0) {
    div.innerHTML = `<p class="text-white">No songs found.</p>`;
    return;
  }

  songs.forEach(song => {
    const item = document.createElement("div");
    item.className = "song-card";

    item.innerHTML = `
      <div>
        <div class="song-title">${song.title}</div>
        <div class="song-artist">${song.artist}</div>
      </div>

      <button class="play-btn">Play</button>
    `;

    item.querySelector("button").onclick = () => play(song);

    div.appendChild(item);
  });
}

function play(song) {
  const footer = document.getElementById("playerFooter");
  footer.classList.remove("d-none");

  const embedContainer = document.getElementById("spotifyEmbedContainer");
  embedContainer.innerHTML = `
    <iframe src="https://open.spotify.com/embed/track/${song.id}?utm_source=generator&theme=0" 
            width="100%" 
            height="80" 
            frameBorder="0" 
            allowfullscreen="" 
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
            loading="lazy"
            style="border-radius: 12px; border: none;">
    </iframe>
  `;
}

// Close player button logic
document.getElementById("closePlayerBtn").onclick = () => {
  const footer = document.getElementById("playerFooter");
  footer.classList.add("d-none");
  document.getElementById("spotifyEmbedContainer").innerHTML = ""; // Stop music playback
};

// Play random song logic
const randomBtn = document.getElementById("randomBtn");
randomBtn.onclick = (e) => {
  e.preventDefault();
  if (loadedSongs && loadedSongs.length > 0) {
    const randomSong = loadedSongs[Math.floor(Math.random() * loadedSongs.length)];
    play(randomSong);
  }
};

loadSongs();
</script>

</body>
</html>
